<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the main shape -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for the upper parallelogram -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE44D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB84D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B4D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for the lower parallelogram -->
    <linearGradient id="grad3" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FFE44D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB84D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4D4D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rotate the entire composition 45 degrees to create diamond orientation -->
  <g transform="translate(200, 200) rotate(45) translate(-200, -200)">
    
    <!-- Main square/diamond background -->
    <rect x="50" y="50" width="300" height="300" fill="url(#grad1)"/>
    
    <!-- Upper parallelogram (creates top part of S) -->
    <path d="M 125 50 L 275 50 L 200 175 L 125 175 Z" fill="url(#grad2)"/>
    
    <!-- Lower parallelogram (creates bottom part of S) -->
    <path d="M 200 225 L 275 225 L 275 350 L 125 350 Z" fill="url(#grad3)"/>
    
  </g>
</svg>
